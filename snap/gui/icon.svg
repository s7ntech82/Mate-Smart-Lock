<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#2471a3"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d0e8f8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="52" ry="52" fill="url(#bg)"/>

  <!-- Lock shackle (arch) -->
  <path d="M 88 136 L 88 100 A 40 40 0 0 1 168 100 L 168 136"
        fill="none" stroke="url(#lock)" stroke-width="20" stroke-linecap="round"/>

  <!-- Lock body -->
  <rect x="64" y="130" width="128" height="94" rx="16" fill="url(#lock)"/>

  <!-- Bluetooth symbol (cutout in lock body color = background color) -->
  <g transform="translate(128, 177)" stroke="#1e4a7a" stroke-width="6"
     stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="0" y1="-26" x2="0" y2="26"/>
    <polyline points="0,-26 16,-13 0,0"/>
    <polyline points="0,0 16,13 0,26"/>
  </g>
</svg>
